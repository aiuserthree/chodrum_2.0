<body style="margin:0;padding:0;background-color:#fafafa;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">

              <img src="https://lofnqvpfmbdchuezfdxs.supabase.co/storage/v1/object/public/email/logo.png" width="44" height="44" alt="CHODRUM" style="display:block;width:44px;height:44px;border:0;margin:0 auto;">
