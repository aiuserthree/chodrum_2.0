<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>[CHODRUM] 비밀번호 재설정 인증코드</title>
  <!--
    Supabase Dashboard → Authentication → Email Templates → Reset password
    Subject: [CHODRUM] 비밀번호 재설정 인증코드
    Body: 이 파일 전체(또는 <body> 안 내용)를 붙여넣으세요.

    ★ 다크모드 로고: Supabase Storage → email 버킷에 logo-white.png 업로드
       (로컬: html/shared/logo-white.png)
  -->
  <style type="text/css">
    .email-logo-wrap { line-height: 0; font-size: 0; }
    .email-logo {
      border: 0;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .email-logo-light { display: block !important; margin: 0 auto; }
    .email-logo-dark { display: none !important; margin: 0 auto; mso-hide: all; }
    @media (prefers-color-scheme: dark) {
      .email-logo-light { display: none !important; mso-hide: all; }
      .email-logo-dark { display: block !important; }
    }
    [data-ogsc] .email-logo-light,
    [data-ogsb] .email-logo-light {
      display: none !important;
      mso-hide: all;
    }
    [data-ogsc] .email-logo-dark,
    [data-ogsb] .email-logo-dark {
      display: block !important;
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#fafafa;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">
    비밀번호 재설정 인증코드 {{ .Token }} — 아래 6자리 코드를 입력해주세요.
  </div>
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#fafafa;margin:0;padding:0;border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:40px 16px 56px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="420" style="width:100%;max-width:420px;background-color:#ffffff;border:1px solid #eaeaea;border-radius:12px;border-collapse:separate;overflow:hidden;">
          <!-- content -->
          <tr>
            <td align="center" style="padding:36px 32px 32px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;">
              <div class="email-logo-wrap">
                <img class="email-logo email-logo-light" src="https://lofnqvpfmbdchuezfdxs.supabase.co/storage/v1/object/public/email/logo.png" width="44" height="44" alt="CHODRUM" style="display:block;width:44px;height:44px;border:0;margin:0 auto;border-radius:6px;box-sizing:border-box;">
                <img class="email-logo email-logo-dark" src="https://lofnqvpfmbdchuezfdxs.supabase.co/storage/v1/object/public/email/logo-white.png" width="44" height="44" alt="CHODRUM" style="display:none;width:44px;height:44px;border:0;margin:0 auto;border-radius:6px;box-sizing:border-box;mso-hide:all;">
              </div>
              <h1 style="margin:26px 0 0;font-size:21px;font-weight:600;letter-spacing:-0.6px;color:#171717;line-height:1.3;">비밀번호 재설정</h1>
              <p style="margin:10px 0 0;font-size:13.5px;line-height:1.7;color:#666666;">아래 6자리 인증코드를 입력해주세요.</p>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="280" style="width:100%;max-width:280px;margin:24px auto 0;border-collapse:separate;">
                <tr>
                  <td align="center" style="background-color:#fafafa;border:1px solid #eaeaea;border-radius:12px;padding:20px 12px 16px;">
                    <div style="font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace;font-size:34px;font-weight:600;letter-spacing:10px;color:#171717;line-height:1.2;">
                      {{ .Token }}
                    </div>
                  </td>
                </tr>
              </table>
              <p style="margin:22px 0 0;font-size:12px;line-height:1.65;color:#999999;">
                본인이 요청하지 않았다면 이 메일을 무시하셔도 됩니다.<br>
                비밀번호는 인증 완료 후에만 변경돼요.
              </p>
            </td>
          </tr>
          <!-- footer -->
          <tr>
            <td align="center" style="border-top:1px solid #eaeaea;padding:16px 32px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;">
              <p style="margin:0;font-size:11px;line-height:1.7;color:#999999;">
                본 메일은 발신 전용이에요. 문의는 <a href="mailto:chodrumstudio@gmail.com" style="color:#666666;text-decoration:underline;">chodrumstudio@gmail.com</a><br>
                © 조드럼닷컴. All Rights Reserved.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
