<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHODRUM — 내 정보 수정</title>
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/colors.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/typography.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/spacing.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/radius.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/elevation.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/base.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/styles.css">
<link rel="stylesheet" href="../shared/fo.css">
</head>
<body class="fo-body">
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/_ds_bundle.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/store.js"></script>
<script type="text/babel" src="fo-shared.jsx"></script>
<script type="text/babel">
/* FO-09-03 내 정보 수정 — 일반: 기본정보+비밀번호 / 소셜: 비밀번호 메뉴 미노출 */
const DS = window.DrumSheetStoreDesignSystem_3a2462;
const { Button, Input, Icon, Card, Badge } = DS;
const F = window.FO;

const PROVIDER_LABEL = { kakao: '카카오', naver: '네이버', google: '구글' };

function EditPage() {
  F.useStoreTick();
  const user = Store.user.get();
  const [mode, setMode] = React.useState(user && user.type === 'social' ? '소셜 회원' : '일반 회원');
  const social = mode === '소셜 회원';
  const demo = user || { name: '김드럼', email: social ? 'choi@kakao.com' : 'kim@example.com', provider: social ? 'kakao' : 'email' };

  const [name, setName] = React.useState(demo.name);
  const [birth, setBirth] = React.useState('19950413');
  const [pw0, setPw0] = React.useState('');
  const [pw1, setPw1] = React.useState('');
  const [pw2, setPw2] = React.useState('');

  return (
    <F.Scaffold title="내 정보 수정" back={F.PAGES.my}>
      <div data-screen-label="FO-09-03 내 정보 수정" className="fo-container narrow" style={{ padding: '0 0 32px' }}>
        <F.PreviewToggle options={['일반 회원', '소셜 회원']} value={mode} onChange={setMode} />

        <F.Section label="기본 정보" first>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Input label="이름" value={name} onChange={(e) => setName(e.target.value)} />
            <Input label="이메일 (로그인 ID)" value={social ? 'choi@kakao.com' : 'kim@example.com'} disabled hint="로그인 ID는 변경할 수 없어요." />
            <Input label="생년월일" inputMode="numeric" maxLength={8} placeholder="YYYYMMDD · 예: 19950413" value={birth} onChange={(e) => setBirth(e.target.value.replace(/\D/g, '').slice(0, 8))} error={birth && !/^\d{8}$/.test(birth) ? '생년월일 8자리를 확인해주세요.' : undefined} />
          </div>
        </F.Section>

        {social ? (
          /* 소셜 회원 — 비밀번호 변경 메뉴 미노출 (원천 차단) */
          <F.Section label="로그인 방식">
            <Card padding={16} style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
              <Icon name="lock" size={16} style={{ color: 'var(--color-icon)', marginTop: 2, flex: 'none' }} />
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ fontSize: 14, fontWeight: 600 }}>{PROVIDER_LABEL[demo.provider] || '카카오'} 계정으로 로그인 중</span>
                  <Badge variant="outline" size="sm">소셜 회원</Badge>
                </div>
                <p className="fo-caption" style={{ marginTop: 6 }}>소셜 회원은 비밀번호가 없어 비밀번호 변경 메뉴가 표시되지 않아요. 로그인은 항상 {PROVIDER_LABEL[demo.provider] || '카카오'} 인증으로 진행돼요.</p>
              </div>
            </Card>
          </F.Section>
        ) : (
          <F.Section label="비밀번호 변경">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <Input label="현재 비밀번호" type="password" placeholder="••••••••" value={pw0} onChange={(e) => setPw0(e.target.value)} />
              <Input label="새 비밀번호" type="password" placeholder="8자 이상" value={pw1} onChange={(e) => setPw1(e.target.value)} />
              <Input label="새 비밀번호 확인" type="password" placeholder="한 번 더 입력" value={pw2} onChange={(e) => setPw2(e.target.value)} error={pw2 && pw1 !== pw2 ? '비밀번호가 서로 달라요.' : undefined} />
              <div><Button variant="secondary" size="md" disabled={!(pw0 && pw1.length >= 8 && pw1 === pw2)} onClick={() => { setPw0(''); setPw1(''); setPw2(''); F.toast('비밀번호가 변경되었어요'); }}>비밀번호 변경</Button></div>
            </div>
          </F.Section>
        )}

        <div style={{ marginTop: 28, display: 'flex', gap: 10 }}>
          <Button variant="primary" size="lg" fullWidth onClick={() => F.toast('내 정보가 저장되었어요')}>저장하기</Button>
        </div>
        <p className="fo-caption" style={{ marginTop: 16, textAlign: 'center' }}>계정을 삭제하려면 <a href={F.PAGES.withdraw} style={{ color: 'var(--text-secondary)', textDecoration: 'underline', textUnderlineOffset: 2 }}>회원 탈퇴</a>로 이동하세요.</p>
      </div>
    </F.Scaffold>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<EditPage />);
</script>
</body>
</html>
