<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHODRUM — 비회원 주문 조회</title>
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/colors.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/typography.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/spacing.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/radius.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/elevation.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/base.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/styles.css">
<link rel="stylesheet" href="../shared/fo.css">
</head>
<body class="fo-body">
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/_ds_bundle.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/store.js"></script>
<script type="text/babel" src="fo-shared.jsx"></script>
<script type="text/babel">
/* FO-10 비회원 주문 조회 — 이메일 입력 → 인증코드 → 구매 악보 조회/다운로드 */
const DS = window.DrumSheetStoreDesignSystem_3a2462;
const { Button, Input, Icon, Card, Badge } = DS;
const F = window.FO;
const D = window.DrumData;

function GuestLookupPage() {
  const [step, setStep] = React.useState(1); /* 1 이메일 → 2 인증코드 → 3 결과 */
  const [email, setEmail] = React.useState(F.qp('email') || '');
  const [code, setCode] = React.useState('');
  const [codeErr, setCodeErr] = React.useState('');
  const emailOk = /.+@.+\..+/.test(email);

  const orders = React.useMemo(() => {
    if (step !== 3) return [];
    const mine = Store.guestOrders.forEmail(email);
    if (mine.length) return mine;
    if (email.toLowerCase() === D.guestSampleEmail) return D.guestSampleOrders;
    return [];
  }, [step, email]);

  const verify = () => {
    if (code.trim().length !== 6) { setCodeErr('6자리 인증코드를 입력해주세요.'); return; }
    setCodeErr(''); setStep(3);
  };

  return (
    <F.Scaffold title="비회원 주문 조회" back={F.PAGES.home}>
      <div data-screen-label="FO-10 비회원 주문 조회" className="fo-container narrow" style={{ padding: '0 0 40px' }}>
        <div style={{ padding: '32px 0 18px' }}>
          <h3 style={{ fontSize: 22, letterSpacing: '-0.6px' }}>비회원 주문 조회</h3>
          <p style={{ fontSize: 14, color: 'var(--text-secondary)', marginTop: 8, lineHeight: 1.55 }}>주문 시 입력한 이메일로 인증하면 구매한 악보를 확인하고 다운로드할 수 있어요.</p>
        </div>

        {step === 1 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Input label="주문 이메일" type="email" placeholder="you@example.com" value={email} onChange={(e) => setEmail(e.target.value)} hint="주문 시 입력한 이메일만 조회할 수 있어요." />
            <Button variant="primary" size="lg" fullWidth disabled={!emailOk} onClick={() => { setStep(2); F.toast('인증코드를 보냈어요'); }}>인증코드 받기</Button>
            <p className="fo-caption" style={{ textAlign: 'center' }}>데모 화면: <span className="ds-mono">guest@example.com</span> 또는 비회원 결제 시 입력한 이메일로 조회돼요.</p>
          </div>
        ) : null}

        {step === 2 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Input label="인증코드" placeholder="6자리 코드" value={code} onChange={(e) => { setCode(e.target.value); setCodeErr(''); }} error={codeErr || undefined} hint={email + ' 로 코드를 보냈어요. 스팸함도 확인해보세요.'} />
            <Button variant="primary" size="lg" fullWidth onClick={verify}>인증하고 조회하기</Button>
            <Button variant="ghost" size="md" fullWidth onClick={() => F.toast('인증코드를 다시 보냈어요')}>코드 재발송</Button>
          </div>
        ) : null}

        {step === 3 ? (
          orders.length ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <Icon name="check" size={14} style={{ color: 'var(--status-success)' }} />
                <span style={{ fontSize: 13.5 }}><b className="ds-mono">{email}</b> 인증 완료</span>
              </div>
              {orders.map((o) => (
                <Card key={o.orderNo} padding={16}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 8, flexWrap: 'wrap' }}>
                    <span className="ds-mono" style={{ fontSize: 12.5, fontWeight: 600 }}>{o.orderNo}</span>
                    <span className="ds-mono" style={{ fontSize: 11.5, color: 'var(--text-secondary)' }}>{o.date}</span>
                  </div>
                  <div style={{ marginTop: 4 }}>
                    {o.items.map((it, i) => {
                      const s = D.byId(it.id);
                      const expired = it.dday < 0;
                      return (
                        <div key={it.id + i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 0', borderTop: i ? '1px solid var(--border-default)' : 'none' }}>
                          <div style={{ width: 44, flex: 'none', borderRadius: 8, overflow: 'hidden', border: '1px solid var(--border-default)' }}><F.StaffThumb ratio="1 / 1" size={15} /></div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.3px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.title}</div>
                            <div style={{ marginTop: 4 }}><F.DdayBadge dday={it.dday} /></div>
                          </div>
                          <Button variant={expired ? 'secondary' : 'primary'} size="sm" iconLeft="download" disabled={expired}
                            onClick={() => F.toast('「' + s.title + '」 PDF 다운로드가 시작되었어요 (샘플)')}>{expired ? '만료' : 'PDF'}</Button>
                        </div>
                      );
                    })}
                  </div>
                </Card>
              ))}
              <p className="fo-caption">다운로드는 결제일로부터 7일간 가능해요. 만료된 악보는 고객센터에서 재발급을 요청할 수 있어요.</p>
            </div>
          ) : (
            <div>
              <F.Empty icon="mail" title="해당 이메일로 주문 내역이 없습니다" sub="주문 시 입력한 이메일이 맞는지 다시 확인해주세요. 이메일이 다르면 조회할 수 없어요." action="다른 이메일로 조회" onAction={() => { setStep(1); setCode(''); }} />
            </div>
          )
        ) : null}
      </div>
    </F.Scaffold>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<GuestLookupPage />);
</script>
</body>
</html>
