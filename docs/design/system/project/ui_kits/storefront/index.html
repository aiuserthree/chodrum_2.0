  <script type="text/babel">
/* Shared storefront chrome & product blocks. Composes DS primitives. */
const DS = window.DrumSheetStoreDesignSystem_3a2462;
const { Icon, Badge, IconButton, Card } = DS;

const won = (v) => '₩' + Number(v).toLocaleString('ko-KR');

function Money({ value, size = 16, weight = 600, color = 'var(--text-primary)', strike = false }) {
  return (
    <span className="ds-mono" style={{ fontSize: size, fontWeight: weight, color, fontVariantNumeric: 'tabular-nums', textDecoration: strike ? 'line-through' : 'none' }}>
      {won(value)}
    </span>
  );
}

function StatusBar() {
  return (
    <div style={{ height: 42, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 24px 0 26px', flex: 'none', color: 'var(--color-ink)' }}>
      <span className="ds-mono" style={{ fontSize: 14, fontWeight: 600 }}>9:41</span>
      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
        <Icon name="signal" size={15} /><Icon name="wifi" size={15} /><Icon name="battery-full" size={20} />
      </div>
    </div>
  );
}

function MobileFrame({ children, tabBar }) {
  return (
    <div style={{ width: 390, height: 'min(92vh, 840px)', background: 'var(--surface-card)', borderRadius: 46, boxShadow: 'var(--shadow-xl)', border: '1px solid #e3e3e3', overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column' }}>
      <StatusBar />
      <div id="fo-scroll" style={{ flex: 1, overflowY: 'auto', position: 'relative', WebkitOverflowScrolling: 'touch' }}>
        {children}
      </div>
      {tabBar}
    </div>
  );
}

function TopBar({ title, onBack, right, wordmark }) {
  return (
    <div style={{ position: 'sticky', top: 0, zIndex: 5, height: 52, display: 'flex', alignItems: 'center', gap: 4, padding: '0 8px', background: 'rgba(255,255,255,0.9)', backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)', borderBottom: '1px solid var(--border-default)' }}>
      {onBack ? <IconButton name="chevron-left" variant="ghost" label="뒤로" onClick={onBack} /> : <span style={{ width: 8 }} />}
      {wordmark
        ? <span style={{ fontSize: 19, fontWeight: 600, letterSpacing: '-0.9px', paddingLeft: 8 }}>드럼악보</span>
        : <span style={{ fontSize: 16, fontWeight: 600, letterSpacing: '-0.3px', position: 'absolute', left: 0, right: 0, textAlign: 'center', pointerEvents: 'none' }}>{title}</span>}
      <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 0, zIndex: 1 }}>{right}</div>
    </div>
  );
}

function CartButton({ count, onClick }) {
  return (
    <div style={{ position: 'relative' }}>
      <IconButton name="shopping-cart" variant="ghost" label="장바구니" onClick={onClick} />
      {count ? (
        <span className="ds-mono" style={{ position: 'absolute', top: 2, right: 2, minWidth: 16, height: 16, padding: '0 4px', borderRadius: 9999, background: 'var(--color-ink)', color: '#fff', fontSize: 10, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{count}</span>
      ) : null}
    </div>
  );
}

function TabBar({ active, onChange, favCount }) {
  const tabs = [
    { k: 'home', ic: 'house', l: '홈' },
    { k: 'list', ic: 'search', l: '악보' },
    { k: 'fav', ic: 'heart', l: '찜' },
    { k: 'my', ic: 'user', l: '마이' },
  ];
  return (
    <div style={{ flex: 'none', display: 'flex', borderTop: '1px solid var(--border-default)', background: 'var(--surface-card)', paddingBottom: 10 }}>
      {tabs.map((t) => {
        const on = active === t.k;
        return (
          <button key={t.k} onClick={() => onChange(t.k)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '9px 0 5px', background: 'none', border: 'none', cursor: 'pointer', color: on ? 'var(--color-ink)' : 'var(--color-icon)' }}>
            <span style={{ position: 'relative', display: 'inline-flex' }}>
              <Icon name={t.ic} size={22} />
              {t.k === 'fav' && favCount ? <span style={{ position: 'absolute', top: -2, right: -4, width: 7, height: 7, borderRadius: 9999, background: 'var(--status-danger)' }} /> : null}
            </span>
            <span style={{ fontSize: 10, fontWeight: on ? 600 : 500, letterSpacing: '-0.2px' }}>{t.l}</span>
          </button>
        );
      })}
    </div>
  );
}

function StaffThumb({ ratio = '3 / 4', icon = 'music', size = 30, watermark = false }) {
  return (
    <div style={{ position: 'relative', width: '100%', aspectRatio: ratio, background: '#f6f6f6', display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', inset: 0, backgroundImage: 'repeating-linear-gradient(180deg, transparent 0 15px, #e7e7e7 15px 16px)', backgroundPosition: '0 14px' }} />
      <Icon name={icon} size={size} style={{ color: '#cccccc', position: 'relative' }} />
      {watermark ? (
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', transform: 'rotate(-16deg)', fontFamily: 'var(--font-mono)', fontSize: 20, fontWeight: 500, letterSpacing: 3, color: 'rgba(0,0,0,0.055)', whiteSpace: 'nowrap' }}>미리보기 · PREVIEW · 미리보기</div>
      ) : null}
    </div>
  );
}

function Stars({ value, size = 12 }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, color: 'var(--color-ink)' }}>
      <Icon name="star" size={size} />
      <span className="ds-mono" style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{value.toFixed(1)}</span>
    </span>
  );
}

function SheetCard({ sheet, onOpen, faved, onFav }) {
  return (
    <Card interactive padding={0} onClick={onOpen} style={{ overflow: 'hidden' }}>
      <div style={{ position: 'relative' }}>
        <StaffThumb />
        <div style={{ position: 'absolute', top: 8, left: 8, display: 'flex', gap: 4 }}>
          {sheet.popular ? <Badge variant="solid" size="sm">인기</Badge> : null}
          {sheet.isNew ? <Badge variant="solid" size="sm">NEW</Badge> : null}
        </div>
        <span style={{ position: 'absolute', top: 6, right: 6 }} onClick={(e) => { e.stopPropagation(); onFav && onFav(); }}>
          <IconButton name="heart" round size="sm" variant="secondary" label="찜하기" style={faved ? { color: 'var(--status-danger)' } : undefined} />
        </span>
      </div>
      <div style={{ padding: '10px 12px 12px', display: 'flex', flexDirection: 'column', gap: 5 }}>
        <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.3px', lineHeight: 1.3 }}>{sheet.title}</div>
        <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{sheet.artist}</div>
        <div style={{ display: 'flex', gap: 4, marginTop: 1 }}>
          <Badge variant="outline" size="sm">{sheet.level}</Badge>
          <Badge variant="neutral" size="sm">{sheet.genre}</Badge>
        </div>
        <div style={{ marginTop: 3 }}><Money value={sheet.price} size={16} /></div>
      </div>
    </Card>
  );
}

function SheetRow({ sheet, onOpen, right }) {
  return (
    <div onClick={onOpen} style={{ display: 'flex', gap: 12, padding: '12px 0', cursor: onOpen ? 'pointer' : 'default' }}>
      <div style={{ width: 56, flex: 'none', borderRadius: 8, overflow: 'hidden', border: '1px solid var(--border-default)' }}><StaffThumb ratio="1 / 1" size={20} /></div>
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 3 }}>
        <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.3px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{sheet.title}</div>
        <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{sheet.artist} · {sheet.genre}</div>
        <Money value={sheet.price} size={14} />
      </div>
      {right}
    </div>
  );
}

function SectionHeader({ title, action, onAction }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px', marginBottom: 12 }}>
      <h4 style={{ fontSize: 18, fontWeight: 600, letterSpacing: '-0.4px' }}>{title}</h4>
      {action ? (
        <button onClick={onAction} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-secondary)', fontSize: 13, display: 'inline-flex', alignItems: 'center', gap: 1 }}>
          {action}<Icon name="chevron-right" size={14} />
        </button>
      ) : null}
    </div>
  );
}

Object.assign(window, { Money, won, MobileFrame, TopBar, TabBar, CartButton, StaffThumb, SheetCard, SheetRow, SectionHeader, Stars });

  </script>
  <script type="text/babel">
/* Storefront screens — pure views driven by an app context (see app.jsx). */
const DS = window.DrumSheetStoreDesignSystem_3a2462;
const { Button, IconButton, Card, Badge, Chip, Divider, Icon, Input, Select, Checkbox, QuantityStepper, SocialButton } = DS;
const { Money, won, TopBar, CartButton, StaffThumb, SheetCard, SheetRow, SectionHeader, Stars } = window;

const DATA = window.DrumData;
const byId = (id) => DATA.sheets.find((s) => s.id === id);

/* ---- sticky bottom action bar ---------------------------------- */
function BottomBar({ children }) {
  return (
    <div style={{ position: 'sticky', bottom: 0, background: 'var(--surface-card)', borderTop: '1px solid var(--border-default)', padding: '12px 16px calc(12px + env(safe-area-inset-bottom))', display: 'flex', alignItems: 'center', gap: 10 }}>
      {children}
    </div>
  );
}

/* ================================================================ HOME */
function Home({ nav, faves, toggleFav, cartCount }) {
  const popular = DATA.sheets.filter((s) => s.popular);
  const fresh = DATA.sheets.filter((s) => s.isNew).concat(DATA.sheets).slice(0, 6);
  return (
    <>
      <TopBar wordmark right={<><IconButton name="search" variant="ghost" label="검색" onClick={() => nav.go('list')} /><CartButton count={cartCount} onClick={() => nav.push('cart')} /></>} />
      <div style={{ padding: '14px 16px 6px' }}>
        <div onClick={() => nav.go('list')} style={{ display: 'flex', alignItems: 'center', gap: 8, height: 44, padding: '0 14px', border: '1px solid var(--border-default)', borderRadius: 'var(--radius-inputs)', background: 'var(--surface-card)', cursor: 'pointer', color: 'var(--color-icon)' }}>
          <Icon name="search" size={18} />
          <span style={{ fontSize: 15, color: 'var(--text-placeholder)' }}>곡명, 아티스트 검색</span>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8, overflowX: 'auto', padding: '8px 16px 18px', scrollbarWidth: 'none' }}>
        {DATA.categories.map((c) => <Chip key={c} onClick={() => nav.go('list', { cat: c })}>{c}</Chip>)}
      </div>
      <SectionHeader title="인기 악보" action="전체보기" onAction={() => nav.go('list')} />
      <div style={{ display: 'flex', gap: 12, overflowX: 'auto', padding: '0 16px 24px', scrollbarWidth: 'none' }}>
        {popular.map((s) => (
          <div key={s.id} style={{ width: 150, flex: 'none' }}>
            <SheetCard sheet={s} onOpen={() => nav.push('detail', { id: s.id })} faved={faves.includes(s.id)} onFav={() => toggleFav(s.id)} />
          </div>
        ))}
      </div>
      <SectionHeader title="신규 악보" action="전체보기" onAction={() => nav.go('list')} />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, padding: '0 16px 28px' }}>
        {fresh.map((s, i) => (
          <SheetCard key={s.id + i} sheet={s} onOpen={() => nav.push('detail', { id: s.id })} faved={faves.includes(s.id)} onFav={() => toggleFav(s.id)} />
        ))}
      </div>
    </>
  );
}

/* ================================================================ LIST */
function SheetList({ nav, faves, toggleFav, initialCat }) {
  const [cat, setCat] = React.useState(initialCat || '전체');
  const [sort, setSort] = React.useState('인기순');
  let list = DATA.sheets.filter((s) => cat === '전체' || s.genre === cat);
  list = [...list].sort((a, b) => sort === '가격순' ? a.price - b.price : sort === '이름순' ? a.title.localeCompare(b.title) : sort === '최신순' ? Number(b.isNew) - Number(a.isNew) : b.sold - a.sold);
  return (
    <>
      <TopBar title="악보" onBack={() => nav.back()} right={<CartButton onClick={() => nav.push('cart')} />} />
      <div style={{ position: 'sticky', top: 52, zIndex: 4, background: 'rgba(255,255,255,0.94)', backdropFilter: 'blur(8px)', borderBottom: '1px solid var(--border-default)' }}>
        <div style={{ display: 'flex', gap: 8, overflowX: 'auto', padding: '12px 16px', scrollbarWidth: 'none' }}>
          {DATA.categories.map((c) => <Chip key={c} selected={cat === c} onClick={() => setCat(c)}>{c}</Chip>)}
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 16px 10px' }}>
        <span className="ds-mono" style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{list.length}개의 악보</span>
        <div style={{ width: 128 }}><Select size="sm" value={sort} onChange={(e) => setSort(e.target.value)} options={DATA.sorts} /></div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, padding: '0 16px 28px' }}>
        {list.map((s) => (
          <SheetCard key={s.id} sheet={s} onOpen={() => nav.push('detail', { id: s.id })} faved={faves.includes(s.id)} onFav={() => toggleFav(s.id)} />
        ))}
      </div>
    </>
  );
}

/* ================================================================ DETAIL */
function SheetDetail({ nav, id, faves, toggleFav, addToCart, cartCount }) {
  const s = byId(id);
  const [qty, setQty] = React.useState(1);
  const faved = faves.includes(s.id);
  const related = DATA.sheets.filter((x) => x.genre === s.genre && x.id !== s.id).slice(0, 4);
  return (
    <>
      <TopBar title="악보 상세" onBack={() => nav.back()} right={<CartButton count={cartCount} onClick={() => nav.push('cart')} />} />
      <div style={{ padding: 16 }}>
        <Card padding={0} style={{ overflow: 'hidden' }}><StaffThumb ratio="4 / 5" size={44} watermark /></Card>
      </div>
      <div style={{ padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        <div style={{ display: 'flex', gap: 6 }}>
          {s.popular ? <Badge variant="solid" size="sm">인기</Badge> : null}
          <Badge variant="outline" size="sm">{s.level}</Badge>
          <Badge variant="neutral" size="sm">{s.genre}</Badge>
        </div>
        <h3 style={{ fontSize: 24, fontWeight: 600, letterSpacing: '-0.8px', lineHeight: 1.25 }}>{s.title}</h3>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 14, color: 'var(--text-secondary)' }}>
          <span>{s.artist}</span><Stars value={s.rating} />
          <span className="ds-mono" style={{ fontSize: 12 }}>판매 {s.sold.toLocaleString('ko-KR')}</span>
        </div>
        <div style={{ marginTop: 4 }}><Money value={s.price} size={28} /></div>
      </div>
      <div style={{ margin: '16px', padding: '14px 16px', border: '1px solid var(--border-default)', borderRadius: 'var(--radius-cards)', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {[['장르', s.genre], ['난이도', s.level], ['페이지', s.pages + '페이지'], ['파일', 'PDF · 결제 후 7일 다운로드']].map(([k, v]) => (
          <div key={k} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14 }}>
            <span style={{ color: 'var(--text-secondary)' }}>{k}</span><span style={{ fontWeight: 500 }}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{ padding: '0 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ fontSize: 15, fontWeight: 600 }}>수량</span>
        <QuantityStepper value={qty} min={1} max={10} onChange={setQty} />
      </div>
      <SectionHeader title="관련 악보" onAction={() => nav.go('list', { cat: s.genre })} action="더보기" />
      <div style={{ display: 'flex', gap: 12, overflowX: 'auto', padding: '0 16px 24px', scrollbarWidth: 'none' }}>
        {related.map((r) => <div key={r.id} style={{ width: 140, flex: 'none' }}><SheetCard sheet={r} onOpen={() => nav.replace('detail', { id: r.id })} faved={faves.includes(r.id)} onFav={() => toggleFav(r.id)} /></div>)}
      </div>
      <BottomBar>
        <IconButton name="heart" variant="secondary" size="lg" label="찜하기" onClick={() => toggleFav(s.id)} style={faved ? { color: 'var(--status-danger)', borderColor: 'var(--status-danger)' } : undefined} />
        <div style={{ flex: 1 }}><Button variant="primary" size="lg" fullWidth iconLeft="shopping-cart" onClick={() => { addToCart(s.id, qty); nav.push('cart'); }}>장바구니 담기</Button></div>
      </BottomBar>
    </>
  );
}

/* ================================================================ CART */
function Cart({ nav, cart, setCart, user }) {
  const [sel, setSel] = React.useState(cart.map((c) => c.id));
  React.useEffect(() => { setSel((prev) => prev.filter((id) => cart.some((c) => c.id === id))); }, [cart.length]);
  const items = cart.map((c) => ({ ...byId(c.id), qty: c.qty }));
  const selItems = items.filter((it) => sel.includes(it.id));
  const total = selItems.reduce((n, it) => n + it.price * it.qty, 0);
  const allOn = sel.length === cart.length && cart.length > 0;
  const setQty = (id, q) => setCart(cart.map((c) => c.id === id ? { ...c, qty: q } : c));
  const remove = (id) => setCart(cart.filter((c) => c.id !== id));

  if (!cart.length) {
    return (
      <>
        <TopBar title="장바구니" onBack={() => nav.back()} />
        <Empty icon="shopping-cart" title="장바구니가 비어 있어요" sub="마음에 드는 악보를 담아보세요." action="악보 둘러보기" onAction={() => nav.go('list')} />
      </>
    );
  }
  return (
    <>
      <TopBar title="장바구니" onBack={() => nav.back()} />
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 16px 6px' }}>
        <Checkbox checked={allOn} indeterminate={sel.length > 0 && !allOn} label={`전체 선택 (${sel.length}/${cart.length})`} onChange={(on) => setSel(on ? cart.map((c) => c.id) : [])} />

  <script type="text/babel">
/* Storefront app — navigation + state, composing the screens. */
function App() {
  const [tab, setTab] = React.useState('home');
  const [stack, setStack] = React.useState([]);
  const [listParams, setListParams] = React.useState({});
  const [cart, setCart] = React.useState([{ id: 's1', qty: 1 }, { id: 's9', qty: 2 }]);
  const [faves, setFaves] = React.useState(['s3', 's5']);
  const [user, setUser] = React.useState(null);
  const [purchases] = React.useState([
    { id: 's2', date: '2026.07.11', dday: 5 },
    { id: 's5', date: '2026.07.07', dday: 1 },
    { id: 's8', date: '2026.06.28', dday: -1 },
  ]);

  const cartCount = cart.reduce((n, c) => n + c.qty, 0);

  const nav = {
    go: (t, params) => { if (t === 'list') setListParams(params || {}); setStack([]); setTab(t); },
    push: (screen, params = {}) => setStack((s) => [...s, { screen, params }]),
    replace: (screen, params = {}) => setStack((s) => [...s.slice(0, -1), { screen, params }]),
    back: () => setStack((s) => s.slice(0, -1)),
    reset: (t) => { setStack([]); setTab(t); },
  };

  const stackKey = JSON.stringify(stack);
  React.useEffect(() => { const el = document.getElementById('fo-scroll'); if (el) el.scrollTop = 0; }, [tab, stackKey]);

  const addToCart = (id, qty = 1) => setCart((c) => c.some((x) => x.id === id) ? c.map((x) => x.id === id ? { ...x, qty: Math.min(10, x.qty + qty) } : x) : [...c, { id, qty }]);
  const toggleFav = (id) => setFaves((f) => f.includes(id) ? f.filter((x) => x !== id) : [...f, id]);
  const onPaid = (order) => { setCart((c) => c.filter((x) => !order.items.some((it) => it.id === x.id))); setStack([{ screen: 'complete', params: { order } }]); };

  let content = null;
  let showTabs = false;

  if (stack.length) {
    const top = stack[stack.length - 1];
    const p = top.params || {};
    if (top.screen === 'detail') content = <SheetDetail key={'d' + p.id} nav={nav} id={p.id} faves={faves} toggleFav={toggleFav} addToCart={addToCart} cartCount={cartCount} />;
    else if (top.screen === 'cart') content = <Cart nav={nav} cart={cart} setCart={setCart} user={user} />;
    else if (top.screen === 'checkout') content = <Checkout nav={nav} cart={cart} ids={p.ids} user={user} onPaid={onPaid} />;
    else if (top.screen === 'complete') content = <Complete nav={nav} order={p.order} />;
    else if (top.screen === 'login') content = <Login nav={nav} setUser={setUser} />;
    else if (top.screen === 'guest') content = <GuestLookup nav={nav} />;
  } else {
    showTabs = true;
    if (tab === 'home') content = <Home nav={nav} faves={faves} toggleFav={toggleFav} cartCount={cartCount} />;
    else if (tab === 'list') content = <SheetList key={'list-' + (listParams.cat || 'all')} nav={nav} faves={faves} toggleFav={toggleFav} initialCat={listParams.cat} />;
    else if (tab === 'fav') content = <Wishlist nav={nav} faves={faves} toggleFav={toggleFav} addToCart={addToCart} />;
    else if (tab === 'my') content = <MyPage nav={nav} user={user} setUser={setUser} purchases={purchases} />;
  }

  return (
    <MobileFrame tabBar={showTabs ? <TabBar active={tab} onChange={(t) => nav.go(t)} favCount={faves.length} /> : null}>
      {content}
    </MobileFrame>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);

  </script>
</body>
</html>
