  <script type="text/babel">
/* Admin (BO) — desktop back-office shell + views. Composes DS primitives. */
const DS = window.DrumSheetStoreDesignSystem_3a2462;
const { Button, IconButton, Card, Badge, Chip, Divider, Icon, Input, Select, Checkbox } = DS;
const A = window.AdminData;
const won = (v) => '₩' + Number(v).toLocaleString('ko-KR');
const mono = { fontFamily: 'var(--font-mono)', fontVariantNumeric: 'tabular-nums' };

const NAV_MAIN = [
  { k: 'dashboard', ic: 'layout-dashboard', l: '대시보드' },
  { k: 'sheets', ic: 'music', l: '악보 관리' },
  { k: 'orders', ic: 'receipt', l: '주문 / 결제' },
  { k: 'members', ic: 'users', l: '회원 관리' },
  { k: 'stats', ic: 'trending-up', l: '매출 / 통계' },
];
const NAV_SET = [
  { k: 'banner', ic: 'image', l: '배너 / 추천' },
  { k: 'terms', ic: 'file-text', l: '약관 관리' },
  { k: 'pg', ic: 'credit-card', l: 'PG 설정' },
  { k: 'email', ic: 'mail', l: '이메일 설정' },
];
const TITLES = Object.fromEntries([...NAV_MAIN, ...NAV_SET].map((n) => [n.k, n.l]));

const ORDER_TONE = { 결제완료: 'success', 환불: 'danger', 대기: 'warning' };

/* ---------------- shell ---------------- */
function Sidebar({ active, setActive }) {
  const Item = ({ n }) => {
    const on = active === n.k;
    return (
      <button onClick={() => setActive(n.k)} style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%', padding: '9px 12px', borderRadius: 'var(--radius-lg)', border: 'none', cursor: 'pointer', textAlign: 'left', fontFamily: 'var(--font-sans)', fontSize: 14, fontWeight: on ? 600 : 500, background: on ? '#f1f1f1' : 'transparent', color: on ? 'var(--color-ink)' : 'var(--text-secondary)' }}>
        <Icon name={n.ic} size={18} style={{ color: on ? 'var(--color-ink)' : 'var(--color-icon)' }} />{n.l}
      </button>
    );
  };
  return (
    <aside style={{ width: 232, flex: 'none', borderRight: '1px solid var(--border-default)', background: 'var(--surface-card)', display: 'flex', flexDirection: 'column', padding: 16, gap: 4 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 7, padding: '6px 12px 16px' }}>
        <span style={{ fontSize: 19, fontWeight: 600, letterSpacing: '-0.9px' }}>드럼악보</span>
        <span style={{ ...mono, fontSize: 10, letterSpacing: '1px', textTransform: 'uppercase', color: 'var(--text-secondary)' }}>Admin</span>
      </div>
      {NAV_MAIN.map((n) => <Item key={n.k} n={n} />)}
      <div style={{ ...mono, fontSize: 10, letterSpacing: '0.6px', textTransform: 'uppercase', color: 'var(--text-tertiary)', padding: '18px 12px 6px' }}>설정</div>
      {NAV_SET.map((n) => <Item key={n.k} n={n} />)}
    </aside>
  );
}

function Topbar({ title }) {
  return (
    <div style={{ height: 60, flex: 'none', borderBottom: '1px solid var(--border-default)', background: 'rgba(255,255,255,0.9)', backdropFilter: 'blur(8px)', display: 'flex', alignItems: 'center', gap: 16, padding: '0 28px' }}>

    </div>
  );
}

/* ---------------- primitives ---------------- */
function StatCard({ s }) {
  const up = s.delta >= 0;
  return (
    <Card padding={18} style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{s.k}</span>
        <span style={{ color: 'var(--color-icon)' }}><Icon name={s.ic} size={18} /></span>
      </div>
      <div style={{ ...mono, fontSize: 26, fontWeight: 600, letterSpacing: '-1px' }}>{s.unit === '₩' ? won(s.v) : s.v.toLocaleString('ko-KR') + s.unit}</div>
      <div style={{ fontSize: 12, color: up ? 'var(--status-success)' : 'var(--status-danger)', display: 'flex', alignItems: 'center', gap: 3 }}>

      </div>
    </Card>
  );
}

function Bars() {
  const max = Math.max(...A.revenue7.map((r) => r.v));
  return (
    <Card padding={20} style={{ gridColumn: '1 / 3' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
        <span style={{ fontSize: 15, fontWeight: 600 }}>주간 매출</span>
        <span style={{ ...mono, fontSize: 12, color: 'var(--text-secondary)' }}>최근 7일 · 만원</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 12, height: 140 }}>
        {A.revenue7.map((r, i) => (
          <div key={r.d} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, height: '100%', justifyContent: 'flex-end' }}>
            <div style={{ width: '100%', maxWidth: 34, height: (r.v / max * 100) + '%', background: i === A.revenue7.length - 1 ? 'var(--color-ink)' : '#e0e0e0', borderRadius: 4, transition: 'height 400ms ease' }} />
            <span style={{ fontSize: 11, color: 'var(--text-secondary)' }}>{r.d}</span>
          </div>
        ))}
      </div>
    </Card>
  );
}

function Table({ head, children }) {
  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13.5 }}>
        <thead>
          <tr>{head.map((h, i) => <th key={i} style={{ textAlign: h.r ? 'right' : 'left', padding: '10px 12px', fontSize: 12, fontWeight: 500, color: 'var(--text-secondary)', borderBottom: '1px solid var(--border-default)', whiteSpace: 'nowrap' }}>{h.l || h}</th>)}</tr>
        </thead>
        <tbody>{children}</tbody>
      </table>
    </div>
  );
}
function Td({ children, r, style }) {
  return <td style={{ padding: '12px', borderBottom: '1px solid var(--border-default)', textAlign: r ? 'right' : 'left', verticalAlign: 'middle', ...style }}>{children}</td>;
}
function Thumb() {
  return <span style={{ width: 34, height: 34, borderRadius: 6, border: '1px solid var(--border-default)', background: '#f6f6f6', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: '#c9c9c9', flex: 'none' }}><Icon name="music" size={15} /></span>;
}

/* ---------------- views ---------------- */
function Dashboard() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
        {A.stats.map((s) => <StatCard key={s.k} s={s} />)}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <Bars />

      <Card padding={0}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 18px' }}>
          <span style={{ fontSize: 15, fontWeight: 600 }}>최근 주문</span>
          <Button variant="ghost" size="sm" iconRight="chevron-right">전체보기</Button>
        </div>
        <div style={{ padding: '0 6px 6px' }}>
          <Table head={['주문번호', '주문자', '상품', { l: '금액', r: true }, '상태', { l: '시간', r: true }]}>
            {A.orders.slice(0, 5).map((o) => (
              <tr key={o.no}>
                <Td><span style={{ ...mono, fontSize: 12 }}>{o.no}</span></Td>
                <Td>{o.buyer}</Td>
                <Td><span style={{ color: 'var(--text-secondary)' }}>{o.item}</span></Td>
                <Td r><span style={mono}>{won(o.amount)}</span></Td>
                <Td><Badge variant={ORDER_TONE[o.status]} size="sm">{o.status}</Badge></Td>
                <Td r><span style={{ ...mono, fontSize: 12, color: 'var(--text-secondary)' }}>{o.date}</span></Td>
              </tr>
            ))}
          </Table>
        </div>
      </Card>
    </div>

}

function Sheets() {
  const [q, setQ] = React.useState('');
  const [genre, setGenre] = React.useState('전체');
  const rows = A.sheets.filter((s) => (genre === '전체' || s.genre === genre) && (s.title + s.artist).toLowerCase().includes(q.toLowerCase()));
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ width: 260 }}><Input size="sm" iconLeft="search" placeholder="곡명 / 아티스트" value={q} onChange={(e) => setQ(e.target.value)} /></div>
        <div style={{ width: 150 }}><Select size="sm" value={genre} onChange={(e) => setGenre(e.target.value)} options={['전체', '발라드', '락', '재즈', 'K-POP', '메탈', '시티팝', 'CCM']} /></div>
        <div style={{ marginLeft: 'auto' }}><Button variant="primary" size="sm" iconLeft="plus">악보 등록</Button></div>
      </div>
      <Card padding={0}>
        <div style={{ padding: 6 }}>
          <Table head={['', '곡명 / 아티스트', 'ID', '장르', '난이도', { l: '가격', r: true }, { l: '판매', r: true }, '상태', '']}>
            {rows.map((s) => (
              <tr key={s.id}>
                <Td style={{ width: 46 }}><Thumb /></Td>
                <Td><div style={{ fontWeight: 600 }}>{s.title}</div><div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{s.artist} · {s.pages}p</div></Td>
                <Td><span style={{ ...mono, fontSize: 12, color: 'var(--text-secondary)' }}>{s.id}</span></Td>
                <Td><Badge variant="neutral" size="sm">{s.genre}</Badge></Td>
                <Td><Badge variant="outline" size="sm">{s.level}</Badge></Td>
                <Td r><span style={mono}>{won(s.price)}</span></Td>
                <Td r><span style={mono}>{s.sales.toLocaleString('ko-KR')}</span></Td>
                <Td><Badge variant={s.status === '판매중' ? 'success' : 'neutral'} size="sm">{s.status}</Badge></Td>

              </tr>

        </div>
      </Card>
    </div>
  );
}

function Orders() {
  const [f, setF] = React.useState('전체');
  const filters = ['전체', '결제완료', '대기', '환불'];
  const rows = A.orders.filter((o) => f === '전체' || o.status === f);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', gap: 8 }}>{filters.map((x) => <Chip key={x} selected={f === x} onClick={() => setF(x)}>{x}</Chip>)}</div>
      <Card padding={0}>
        <div style={{ padding: 6 }}>
          <Table head={['주문번호', '주문자', '유형', '상품', '결제수단', { l: '금액', r: true }, '상태', { l: '시간', r: true }]}>
            {rows.map((o) => (
              <tr key={o.no}>
                <Td><span style={{ ...mono, fontSize: 12 }}>{o.no}</span></Td>
                <Td><div style={{ fontWeight: 500 }}>{o.buyer}</div><div style={{ ...mono, fontSize: 11, color: 'var(--text-secondary)' }}>{o.email}</div></Td>

                <Td r><span style={mono}>{won(o.amount)}</span></Td>
                <Td><Badge variant={ORDER_TONE[o.status]} size="sm">{o.status}</Badge></Td>
                <Td r><span style={{ ...mono, fontSize: 12, color: 'var(--text-secondary)' }}>{o.date}</span></Td>
              </tr>
            ))}
          </Table>
        </div>
      </Card>
    </div>
  );
}

  else if (active === 'sheets') view = <Sheets />;
  else if (active === 'orders') view = <Orders />;
  else if (active === 'members') view = <Members />;
  else view = <Settings which={active} />;
  return (
    <div style={{ display: 'flex', height: '100vh', background: 'var(--surface-page)' }}>
      <Sidebar active={active} setActive={setActive} />
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>
        <Topbar title={TITLES[active]} />
        <div style={{ flex: 1, overflowY: 'auto', padding: 28 }}>{view}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<AdminApp />);

  </script>
</body>
</html>
