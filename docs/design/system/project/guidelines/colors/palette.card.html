<!-- @dsCard group="Colors" viewport="700x172" name="Achromatic palette" subtitle="The seven-step blueprint scale — all UI chrome lives here" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 60px; border-radius: var(--radius-lg); box-shadow: inset 0 0 0 1px var(--border-faint); }
  .name { font-size: 13px; font-weight: 500; letter-spacing: -0.1px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); font-feature-settings: "zero"; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="name">Paper White</div><div class="hex">#ffffff</div></div>
    <div class="sw"><div class="chip" style="background:#fafafa"></div><div class="name">Canvas</div><div class="hex">#fafafa</div></div>
    <div class="sw"><div class="chip" style="background:#eaeaea"></div><div class="name">Line</div><div class="hex">#eaeaea</div></div>
    <div class="sw"><div class="chip" style="background:#7d7d7d"></div><div class="name">Icon</div><div class="hex">#7d7d7d</div></div>
    <div class="sw"><div class="chip" style="background:#666666"></div><div class="name">Subtext</div><div class="hex">#666666</div></div>
    <div class="sw"><div class="chip" style="background:#171717"></div><div class="name">Ink</div><div class="hex">#171717</div></div>
    <div class="sw"><div class="chip" style="background:#000000"></div><div class="name">Onyx</div><div class="hex">#000000</div></div>
  </div>
</body>
</html>
