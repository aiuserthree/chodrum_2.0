<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; display: flex; flex-direction: column; gap: 16px; justify-content: center; }
  .mark { display: inline-flex; align-items: baseline; gap: 8px; }
  .ko { font-size: 30px; font-weight: 600; letter-spacing: -1.4px; color: var(--color-onyx); }
  .en { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-secondary); }
  .note { font-size: 12px; color: var(--text-secondary); line-height: 1.55; max-width: 560px; }
  .note b { color: var(--text-primary); font-weight: 500; }
</style>
</head>
<body>
  <div class="mark"><span class="ko">드럼악보</span><span class="en">/ Drum Sheet</span></div>
  <div class="note">Placeholder wordmark set in <b>Geist / Pretendard Semibold</b> with tight tracking. No brand mark was provided — <b>do not invent a logo</b>. Replace this with the real mark when available.</div>
</body>
</html>
