<!-- @dsCard group="Spacing" viewport="700x240" name="Spacing scale" subtitle="Compact, 8-based rhythm with in-between steps" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; }
  .grid { display: flex; flex-direction: column; gap: 7px; }
  .r { display: flex; align-items: center; gap: 12px; }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); width: 44px; text-align: right; flex: none; }
  .bar { height: 12px; background: var(--color-ink); border-radius: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="r"><span class="t">4</span><div class="bar" style="width:4px"></div></div>
    <div class="r"><span class="t">8</span><div class="bar" style="width:8px"></div></div>
    <div class="r"><span class="t">12</span><div class="bar" style="width:12px"></div></div>
    <div class="r"><span class="t">16</span><div class="bar" style="width:16px"></div></div>
    <div class="r"><span class="t">24</span><div class="bar" style="width:24px"></div></div>
    <div class="r"><span class="t">32</span><div class="bar" style="width:32px"></div></div>
    <div class="r"><span class="t">48</span><div class="bar" style="width:48px"></div></div>
    <div class="r"><span class="t">64</span><div class="bar" style="width:64px"></div></div>
    <div class="r"><span class="t">80</span><div class="bar" style="width:80px"></div></div>
  </div>
</body>
</html>
