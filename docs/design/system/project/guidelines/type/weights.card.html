<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; display: flex; align-items: center; }
  .row { display: flex; gap: 40px; width: 100%; }
  .blk { display: flex; flex-direction: column; gap: 6px; }
  .w { font-size: 30px; letter-spacing: -1px; color: var(--text-primary); }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="blk"><span class="w" style="font-weight:400">Regular</span><span class="t">400 · body</span></div>
    <div class="blk"><span class="w" style="font-weight:500">Medium</span><span class="t">500 · buttons</span></div>
    <div class="blk"><span class="w" style="font-weight:600">Semibold</span><span class="t">600 · headings</span></div>
  </div>
</body>
</html>
