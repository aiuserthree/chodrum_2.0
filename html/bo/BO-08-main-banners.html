<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHODRUM Admin — 배너 관리</title>
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/colors.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/typography.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/spacing.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/radius.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/elevation.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/base.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/styles.css">
<link rel="stylesheet" href="../shared/bo.css">
</head>
<body class="bo-body">
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/_ds_bundle.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/api.js"></script>
<script type="text/babel" src="bo-shared.jsx"></script>
<script type="text/babel">
/* BO-08 메인 관리 > 배너 관리 — 홈 배너 목록 · 노출 전환 · 배너 추가/삭제 */
const DS = window.DrumSheetStoreDesignSystem_3a2462;
const { Button, IconButton, Card, Badge, Input, Checkbox, Icon } = DS;
const B = window.BO;
const A = window.AdminData;

const EMPTY_FORM = { title: '', link: '', start: '', end: '', img: '', on: true };

function BannersPage() {
  const [banners, setBanners] = React.useState(A.banners.map((b, i) => ({ ...b, id: 'b' + (i + 1) })));
  const [adding, setAdding] = React.useState(false);
  const [form, setForm] = React.useState(EMPTY_FORM);
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const canAdd = form.title.trim().length > 0;

  const persist = async (next) => {
    setBanners(next);
    try { await window.ChodrumAPI.banners.save(next); }
    catch (e) { console.warn(e); B.toast('배너 동기화 실패'); }
  };
  const add = async () => {
    const period = form.start && form.end ? form.start + ' – ' + form.end : '상시';
    const next = [{ id: 'b' + Date.now(), title: form.title.trim(), link: form.link.trim(), period, img: form.img, on: form.on }, ...banners];
    setAdding(false);
    setForm(EMPTY_FORM);
    await persist(next);
    B.toast('배너가 추가되었어요 · 홈 최상단에 노출돼요');
  };
  const toggle = async (id) => {
    const next = banners.map((b) => b.id === id ? { ...b, on: !b.on } : b);
    await persist(next);
  };
  const remove = async (id) => {
    const next = banners.filter((b) => b.id !== id);
    await persist(next);
    B.toast('배너를 삭제했어요');
  };
  const onCount = banners.filter((b) => b.on).length;

  return (
    <B.Shell active="banners" title="메인 관리 — 배너 관리"
      actions={<Button variant="primary" size="sm" iconLeft="plus" onClick={() => setAdding(true)}>배너 추가</Button>}>
      <div data-screen-label="BO-08 배너 관리" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <Card padding={0}>
          <B.CardHead title="홈 배너" right={<span className="ds-mono" style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{onCount}개 노출중 / 총 {banners.length}개</span>} />
          <div style={{ padding: '0 18px 16px' }}>
            {banners.length ? banners.map((b, i) => (
              <div key={b.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 0', borderTop: i ? '1px solid var(--border-default)' : 'none' }}>
                <Icon name="grip-vertical" size={14} style={{ color: 'var(--color-icon)', opacity: 0.6, flex: 'none' }} />
                <span style={{ width: 52, height: 34, borderRadius: 6, border: '1px solid var(--border-default)', background: '#f6f6f6', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: '#c9c9c9', flex: 'none' }}><Icon name="image" size={15} /></span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{b.title}</div>
                  <div className="ds-mono" style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {b.period}{b.img ? ' · ' + b.img : ''}{b.link ? ' · ' + b.link : ''}
                  </div>
                </div>
                <Badge variant={b.on ? 'success' : 'neutral'} size="sm">{b.on ? '노출중' : '숨김'}</Badge>
                <IconButton name={b.on ? 'eye-off' : 'eye'} variant="ghost" size="sm" label="노출 전환" onClick={() => toggle(b.id)} />
                <IconButton name="trash-2" variant="ghost" size="sm" label="삭제" onClick={() => remove(b.id)} />
              </div>
            )) : (
              <p style={{ padding: '8px 0 4px', fontSize: 13, color: 'var(--text-secondary)' }}>등록된 배너가 없어요. 우측 상단 배너 추가로 등록해주세요.</p>
            )}
          </div>
        </Card>
        <p style={{ fontSize: 12, color: 'var(--text-secondary)' }}>배너는 위에서부터 순서대로 홈 상단에 노출돼요. 기간이 지난 배너는 자동으로 숨김 처리돼요.</p>
      </div>

      {/* 배너 추가 모달 */}
      <B.Modal open={adding} onClose={() => setAdding(false)} title="배너 추가" width={520}
        footer={
          <React.Fragment>
            <Button variant="secondary" size="sm" onClick={() => setAdding(false)}>취소</Button>
            <Button variant="primary" size="sm" disabled={!canAdd} onClick={add}>추가하기</Button>
          </React.Fragment>
        }>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Input label="배너 제목 (필수)" placeholder="예: 여름맞이 신곡 라인업" value={form.title} onChange={set('title')} />
          <Input label="연결 링크" placeholder="예: /list?cat=락 (비우면 링크 없음)" value={form.link} onChange={set('link')} />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <Input label="노출 시작일" placeholder="예: 07.01" value={form.start} onChange={set('start')} />
            <Input label="노출 종료일" placeholder="예: 07.31" value={form.end} onChange={set('end')} />
          </div>
          <p style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: -6 }}>기간을 비우면 상시 노출돼요.</p>
          <button onClick={() => { setForm({ ...form, img: 'banner-' + Math.floor(Math.random() * 900 + 100) + '.png' }); B.toast('이미지가 업로드되었어요 (샘플)'); }}
            style={{ width: '100%', padding: '20px 16px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, background: form.img ? 'var(--surface-sunken)' : 'var(--surface-card)', border: '1px dashed var(--border-strong)', borderRadius: 'var(--radius-cards)', cursor: 'pointer' }}>
            <span style={{ color: form.img ? 'var(--status-success)' : 'var(--color-icon)' }}><Icon name={form.img ? 'check' : 'image'} size={22} /></span>
            <span style={{ fontSize: 13.5, fontWeight: 600 }}>{form.img || '배너 이미지 업로드'}</span>
            <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{form.img ? '다시 선택하려면 클릭하세요' : '권장 1200×400 · PNG/JPG'}</span>
          </button>
          <Checkbox checked={form.on} onChange={(on) => setForm({ ...form, on })} label="등록 즉시 노출" />
        </div>
      </B.Modal>
    </B.Shell>
  );
}
window.ChodrumBoot.whenReady(() => {
  ReactDOM.createRoot(document.getElementById('app')).render(<BannersPage />);
});
</script>
</body>
</html>
