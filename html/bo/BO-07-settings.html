<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHODRUM Admin — 사이트 설정</title>
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/colors.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/typography.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/spacing.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/radius.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/elevation.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/base.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/styles.css">
<link rel="stylesheet" href="../shared/bo.css">
</head>
<body class="bo-body">
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/_ds_bundle.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/legal-docs.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/bo-auth.js"></script>

<script src="../shared/supabase-client.js"></script>
<script src="../shared/api.js"></script>
<script type="text/babel" src="/bo/bo-shared.jsx"></script>
<script type="text/babel">
/* BO-07 사이트 설정 — 약관(새 버전 등록) · PG · 이메일(미리보기/수정)
   ※ 배너/추천 설정은 「메인 관리」 메뉴로 이동 */
const DS = window.DrumSheetStoreDesignSystem_3a2462;
const { Button, IconButton, Card, Badge, Chip, Select, Input, Checkbox, Icon } = DS;
const B = window.BO;
const A = window.AdminData;

const textareaStyle = { width: '100%', minHeight: 140, padding: '10px 12px', fontFamily: 'var(--font-sans)', fontSize: 13.5, lineHeight: 1.65, color: 'var(--text-primary)', border: '1px solid var(--border-default)', borderRadius: 'var(--radius-inputs)', background: 'var(--surface-card)', outline: 'none', resize: 'vertical' };
const bodyPreviewStyle = { ...textareaStyle, minHeight: 280, background: 'var(--surface-sunken)', whiteSpace: 'pre-wrap', resize: 'vertical' };

/* ---------------- 약관 관리 (새 버전 등록 구현) ---------------- */
function nextVer(v) {
  const m = /^v(\d+)\.(\d+)$/.exec(v);
  return m ? 'v' + m[1] + '.' + (Number(m[2]) + 1) : 'v1.0';
}

function syncTerms(list) {
  if (A) A.terms = list;
  return list;
}

function TermsTab() {
  const [terms, setTerms] = React.useState(() => (A.terms && A.terms.length ? A.terms.slice() : []));
  const [open, setOpen] = React.useState(false);
  const [view, setView] = React.useState(null);
  const first = terms[0] || { name: '', ver: 'v1.0' };
  const [doc, setDoc] = React.useState(first.name);
  const [ver, setVer] = React.useState(terms.length ? nextVer(first.ver) : 'v1.0');
  const [date, setDate] = React.useState('2026.07.14');
  const [memo, setMemo] = React.useState('');
  const [body, setBody] = React.useState((first && first.body) || '');

  const pickDoc = (name) => {
    setDoc(name);
    const cur = terms.find((t) => t.name === name);
    setVer(nextVer((cur && cur.ver) || 'v1.0'));
    setBody((cur && cur.body) || '');
  };
  const canSave = terms.length > 0 && /^v\d+\.\d+$/.test(ver) && /^\d{4}\.\d{2}\.\d{2}$/.test(date) && memo.trim().length > 0;
  const register = () => {
    setTerms((ts) => syncTerms(ts.map((t) => (
      t.name === doc ? { ...t, ver, date, body: body || t.body, memo: memo.trim() } : t
    ))));
    setOpen(false); setMemo('');
    B.toast(doc + ' ' + ver + ' 등록 완료 · 시행일부터 적용돼요');
  };

  return (
    <React.Fragment>
      <Card padding={0}>
        <B.CardHead title="약관 문서" right={<Button variant="secondary" size="sm" iconLeft="plus" disabled={!terms.length} onClick={() => { if (!terms.length) return; pickDoc(terms[0].name); setOpen(true); }}>새 버전 등록</Button>} />
        <div style={{ padding: '0 6px 6px' }}>
          {terms.length === 0 ? (
            <p style={{ fontSize: 13, color: 'var(--text-secondary)', padding: '12px 12px 18px', margin: 0 }}>등록된 약관 문서가 없어요. legal-docs.js 를 확인해주세요.</p>
          ) : (
          <B.Table minWidth={640} head={['문서', '구분', '버전', '시행일', '']}>
            {terms.map((t) => (
              <tr key={t.name}>
                <B.Td>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                    <span style={{ fontWeight: 600 }}>{t.name}</span>
                    {t.summary ? <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>{t.summary}</span> : null}
                  </div>
                </B.Td>
                <B.Td><Badge variant={t.required ? 'outline' : 'neutral'} size="sm">{t.required ? '필수' : '선택'}</Badge></B.Td>
                <B.Td><Badge variant="outline" size="sm">{t.ver}</Badge></B.Td>
                <B.Td><span style={{ ...B.mono, fontSize: 12 }}>{t.date}</span></B.Td>
                <B.Td>
                  <div style={{ display: 'flex', gap: 2, justifyContent: 'flex-end' }}>
                    <Button variant="ghost" size="sm" iconLeft="eye" onClick={() => setView(t)}>보기</Button>
                    <Button variant="ghost" size="sm" iconLeft="plus" onClick={() => { pickDoc(t.name); setOpen(true); }}>새 버전</Button>
                  </div>
                </B.Td>
              </tr>
            ))}
          </B.Table>
          )}
        </div>
        <p style={{ fontSize: 12, color: 'var(--text-secondary)', padding: '10px 18px 16px' }}>약관은 버전으로 관리되며, 새 버전 시행 시 기존 동의 이력은 보존돼요. 이용자에게 불리한 변경은 시행 30일 전 공지가 필요해요.</p>
      </Card>

      <B.Modal open={open} onClose={() => setOpen(false)} title="약관 새 버전 등록" width={560}
        footer={
          <React.Fragment>
            <Button variant="secondary" size="sm" onClick={() => setOpen(false)}>취소</Button>
            <Button variant="primary" size="sm" disabled={!canSave} onClick={register}>등록하기</Button>
          </React.Fragment>
        }>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <B.Labeled label="대상 문서">
            <Select value={doc} onChange={(e) => pickDoc(e.target.value)} options={terms.map((t) => t.name)} />
          </B.Labeled>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <Input label="새 버전" value={ver} onChange={(e) => setVer(e.target.value)} error={ver && !/^v\d+\.\d+$/.test(ver) ? 'v1.3 형식으로 입력해주세요.' : undefined} hint={'현재 ' + ((terms.find((t) => t.name === doc) || {}).ver || '—')} />
            <Input label="시행일" placeholder="YYYY.MM.DD" value={date} onChange={(e) => setDate(e.target.value)} error={date && !/^\d{4}\.\d{2}\.\d{2}$/.test(date) ? 'YYYY.MM.DD 형식으로 입력해주세요.' : undefined} />
          </div>
          <B.Labeled label="변경 내용 요약 (필수 · 공지사항에 게시)">
            <textarea style={textareaStyle} placeholder="예: 제7조 다운로드 기간 재부여 절차 구체화" value={memo} onChange={(e) => setMemo(e.target.value)}></textarea>
          </B.Labeled>
          <B.Labeled label="약관 본문 (선택 · 수정 시 새 버전에 반영)">
            <textarea style={{ ...textareaStyle, minHeight: 200 }} value={body} onChange={(e) => setBody(e.target.value)}></textarea>
          </B.Labeled>
        </div>
      </B.Modal>

      <B.Modal open={!!view} onClose={() => setView(null)} title={view ? (view.name + ' · ' + view.ver) : '약관 보기'} width={640}
        footer={<Button variant="secondary" size="sm" onClick={() => setView(null)}>닫기</Button>}>
        {view ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, alignItems: 'center' }}>
              <Badge variant="outline" size="sm">{view.ver}</Badge>
              <span className="ds-mono" style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>시행일 {view.date}</span>
              <Badge variant={view.required ? 'outline' : 'neutral'} size="sm">{view.required ? '필수 동의' : '선택 동의'}</Badge>
            </div>
            {view.memo ? <p style={{ fontSize: 12.5, color: 'var(--text-secondary)', margin: 0 }}>메모 · {view.memo}</p> : null}
            <div style={bodyPreviewStyle}>{view.body || '본문이 없어요.'}</div>
          </div>
        ) : null}
      </B.Modal>
    </React.Fragment>
  );
}

/* ---------------- PG 설정 ---------------- */
function PgTab() {
  const [test, setTest] = React.useState(true);
  const ck = (window.CHODRUM_CONFIG && window.CHODRUM_CONFIG.TOSS_CLIENT_KEY) || 'test_ck_…';
  return (
    <Card padding={18} style={{ maxWidth: 560, display: 'flex', flexDirection: 'column', gap: 14 }}>
      <span style={{ fontSize: 15, fontWeight: 600 }}>PG 연동</span>
      <p style={{ fontSize: 12.5, lineHeight: 1.55, color: 'var(--text-secondary)', margin: 0 }}>
        FO 결제는 <b style={{ color: 'var(--text-primary)' }}>토스페이먼츠</b> SDK로 연동돼 있어요. Client Key는 <span className="ds-mono" style={{ fontSize: 11.5 }}>config.js TOSS_CLIENT_KEY</span>(비우면 데모). Secret Key는 Edge <span className="ds-mono" style={{ fontSize: 11.5 }}>TOSS_SECRET_KEY</span>만. Live 결제는 <span className="ds-mono" style={{ fontSize: 11.5 }}>toss-confirm</span> 배포가 필수예요(승인 없이 결제완료 불가).
      </p>
      <B.Labeled label="PG사"><Select value="토스페이먼츠" onChange={() => {}} options={['토스페이먼츠', 'KG이니시스', '나이스페이먼츠']} /></B.Labeled>
      <Input label="Client Key (config.js)" value={ck} onChange={() => {}} hint="비어 있으면 데모 결제창. 토스 가입 후 테스트/라이브 키를 넣으세요." />
      <Input label="Confirm URL" value={(window.CHODRUM_CONFIG && CHODRUM_CONFIG.TOSS_CONFIRM_URL) || '(SUPABASE_URL/functions/v1/toss-confirm 자동)'} onChange={() => {}} hint="비우면 SUPABASE_URL 기준으로 자동 유도. Edge 미배포 시 Live 결제는 실패합니다." />
      <Input label="Secret Key" type="password" value="****************************" onChange={() => {}} hint="브라우저에 두지 마세요. supabase secrets set TOSS_SECRET_KEY=..." />
      <B.Labeled label="사용할 결제 수단">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingTop: 2 }}>
          <Checkbox checked onChange={() => {}} label="신용 / 체크카드" />
          <Checkbox checked onChange={() => {}} label="카카오페이" />
          <Checkbox checked onChange={() => {}} label="네이버페이" />
          <Checkbox checked onChange={() => {}} label="계좌이체" />
        </div>
      </B.Labeled>
      <Checkbox checked={test} onChange={setTest} label={<span>테스트 모드 {test ? <Badge variant="warning" size="sm">TEST</Badge> : null}</span>} />
      <div style={{ display: 'flex', justifyContent: 'flex-end' }}><Button variant="primary" size="sm" iconLeft="check" onClick={() => B.toast('실제 설정은 config.js · Edge Function에서 관리해요')}>확인</Button></div>
    </Card>
  );
}

/* ---------------- 이메일 설정 (미리보기 / 수정 구현) ---------------- */
const EMAIL_DEFAULTS = [
  { k: '인증코드 발송', d: '회원가입 · 비회원 주문 조회 인증', subject: '[CHODRUM] 인증코드를 확인해주세요', body: '안녕하세요, {이름}님.\n\n요청하신 인증코드는 아래와 같아요.\n\n인증코드: {인증코드}\n\n코드는 발송 시점부터 10분간 유효해요.\n본인이 요청하지 않았다면 이 메일을 무시해주세요.' },
  { k: '결제 완료 안내', d: '주문 내역 + 다운로드 안내', subject: '[CHODRUM] 결제가 완료되었어요 ({주문번호})', body: '{이름}님, 결제가 완료되었어요.\n\n주문번호: {주문번호}\n주문 상품: {상품명}\n결제 금액: {금액}\n\n구매한 악보는 결제일로부터 7일간 PDF로 다운로드할 수 있어요.\n회원은 마이페이지 > 구매 내역에서, 비회원은 주문 시 입력한 이메일로 비회원 주문 조회에서 받을 수 있어요.' },
  { k: '다운로드 만료 임박 (D-1)', d: '만료 하루 전 리마인드', subject: '[CHODRUM] 다운로드 기간이 하루 남았어요', body: '{이름}님, 구매하신 악보의 다운로드 기간이 곧 만료돼요.\n\n대상 악보: {상품명}\n만료 일시: {만료일시}\n\n기간이 지나면 다운로드 버튼이 비활성화돼요. 잊기 전에 지금 받아두세요.' },
  { k: '환불 완료 안내', d: '환불 처리 + 권한 회수 고지', subject: '[CHODRUM] 환불 처리가 완료되었어요 ({주문번호})', body: '{이름}님, 요청하신 환불이 완료되었어요.\n\n주문번호: {주문번호}\n환불 금액: {금액}\n\n환불 정책에 따라 해당 악보의 다운로드 권한은 회수되었어요.\n환불 금액은 결제 수단에 따라 3~5영업일 내 입금돼요.' },
];

function EmailPreview({ t, from }) {
  return (
    <div style={{ border: '1px solid var(--border-default)', borderRadius: 'var(--radius-cards)', overflow: 'hidden' }}>
      <div style={{ padding: '13px 16px', borderBottom: '1px solid var(--border-default)', background: 'var(--surface-sunken)' }}>
        <div className="ds-mono" style={{ fontSize: 11.5, color: 'var(--text-secondary)' }}>FROM — CHODRUM &lt;{from}&gt;</div>
        <div style={{ fontSize: 14.5, fontWeight: 600, marginTop: 6, letterSpacing: '-0.2px' }}>{t.subject}</div>
      </div>
      <div style={{ padding: 16 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, paddingBottom: 12, borderBottom: '1px solid var(--border-default)', marginBottom: 12 }}>
          <img src="../shared/logo.png" alt="CHODRUM 로고" style={{ width: 22, height: 22, objectFit: 'contain' }} />
          <span style={{ fontSize: 13.5, fontWeight: 600, letterSpacing: '-0.2px' }}>CHODRUM</span>
        </div>
        <div style={{ whiteSpace: 'pre-wrap', fontSize: 13.5, lineHeight: 1.75, color: 'var(--text-primary)' }}>{t.body}</div>
        <div style={{ marginTop: 16, paddingTop: 12, borderTop: '1px solid var(--border-default)', fontSize: 11.5, color: 'var(--text-tertiary)', lineHeight: 1.6 }}>
          본 메일은 발신 전용이에요. 문의는 chodrumstudio@gmail.com 으로 보내주세요.<br />© 조드럼닷컴
        </div>
      </div>
    </div>
  );
}

function EmailTab() {
  const [from, setFrom] = React.useState('no-reply@chodrum.example');
  const [sender, setSender] = React.useState('CHODRUM');
  const [templates, setTemplates] = React.useState(EMAIL_DEFAULTS);
  const [preview, setPreview] = React.useState(null); /* index */
  const [editIdx, setEditIdx] = React.useState(null);
  const [draft, setDraft] = React.useState({ subject: '', body: '' });

  const openEdit = (i) => { setEditIdx(i); setDraft({ subject: templates[i].subject, body: templates[i].body }); };
  const saveEdit = () => {
    setTemplates((ts) => ts.map((t, i) => i === editIdx ? { ...t, subject: draft.subject, body: draft.body } : t));
    setEditIdx(null);
    B.toast('템플릿을 저장했어요');
  };

  return (
    <React.Fragment>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16, maxWidth: 640 }}>
        <Card padding={18} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <span style={{ fontSize: 15, fontWeight: 600 }}>발신 설정</span>
          <Input label="발신 이메일" value={from} onChange={(e) => setFrom(e.target.value)} />
          <Input label="발신자 이름" value={sender} onChange={(e) => setSender(e.target.value)} />
        </Card>
        <Card padding={0}>
          <B.CardHead title="메일 템플릿" />
          <div style={{ padding: '0 18px 12px' }}>
            {templates.map((t, i) => (
              <div key={t.k} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 0', borderTop: i ? '1px solid var(--border-default)' : 'none', flexWrap: 'wrap' }}>
                <Icon name="mail" size={16} style={{ color: 'var(--color-icon)', flex: 'none' }} />
                <div style={{ flex: 1, minWidth: 160 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600 }}>{t.k}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 2 }}>{t.d}</div>
                </div>
                <Button variant="ghost" size="sm" iconLeft="eye" onClick={() => setPreview(i)}>미리보기</Button>
                <Button variant="ghost" size="sm" iconLeft="pencil" onClick={() => openEdit(i)}>수정</Button>
              </div>
            ))}
          </div>
          <p style={{ fontSize: 12, color: 'var(--text-secondary)', padding: '4px 18px 16px' }}>{'{이름} {주문번호} {금액}'} 같은 중괄호 변수는 발송 시 실제 값으로 자동 치환돼요.</p>
        </Card>
      </div>

      {/* 미리보기 모달 */}
      <B.Modal open={preview !== null} onClose={() => setPreview(null)} title={preview !== null ? '미리보기 — ' + templates[preview].k : ''} width={560}
        footer={preview !== null ? (
          <React.Fragment>
            <Button variant="secondary" size="sm" iconLeft="pencil" onClick={() => { const i = preview; setPreview(null); openEdit(i); }}>수정하기</Button>
            <Button variant="primary" size="sm" onClick={() => setPreview(null)}>닫기</Button>
          </React.Fragment>
        ) : null}>
        {preview !== null ? <EmailPreview t={templates[preview]} from={from} /> : null}
      </B.Modal>

      {/* 수정 모달 */}
      <B.Modal open={editIdx !== null} onClose={() => setEditIdx(null)} title={editIdx !== null ? '템플릿 수정 — ' + templates[editIdx].k : ''} width={560}
        footer={editIdx !== null ? (
          <React.Fragment>
            <Button variant="secondary" size="sm" onClick={() => setEditIdx(null)}>취소</Button>
            <Button variant="primary" size="sm" disabled={!draft.subject.trim() || !draft.body.trim()} onClick={saveEdit}>저장</Button>
          </React.Fragment>
        ) : null}>
        {editIdx !== null ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <Input label="메일 제목" value={draft.subject} onChange={(e) => setDraft({ ...draft, subject: e.target.value })} />
            <B.Labeled label="본문" hint="{이름} {주문번호} {상품명} {금액} {인증코드} {만료일시} 변수를 사용할 수 있어요.">
              <textarea style={{ ...textareaStyle, minHeight: 200 }} value={draft.body} onChange={(e) => setDraft({ ...draft, body: e.target.value })}></textarea>
            </B.Labeled>
          </div>
        ) : null}
      </B.Modal>
    </React.Fragment>
  );
}

/* ---------------- 페이지 ---------------- */
function SettingsPage() {
  const [tab, setTab] = React.useState('약관 관리');
  const tabs = ['약관 관리', 'PG 설정', '이메일 설정'];
  return (
    <B.Shell active="settings" title="사이트 설정">
      <div data-screen-label="BO-07 사이트 설정" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
          {tabs.map((t) => <Chip key={t} selected={tab === t} onClick={() => setTab(t)}>{t}</Chip>)}
          <span style={{ fontSize: 12, color: 'var(--text-tertiary)', marginLeft: 'auto' }}>배너 · 추천 설정은 <a href="/bo/banners" style={{ color: 'var(--text-secondary)', textDecoration: 'underline', textUnderlineOffset: 2 }}>메인 관리</a>로 이동했어요</span>
        </div>
        {tab === '약관 관리' ? <TermsTab /> : null}
        {tab === 'PG 설정' ? <PgTab /> : null}
        {tab === '이메일 설정' ? <EmailTab /> : null}
      </div>
    </B.Shell>
  );
}
window.ChodrumBoot.whenReady(() => {
  ReactDOM.createRoot(document.getElementById('app')).render(<SettingsPage />);
});
</script>
</body>
