<title>CHODRUM Admin — 로그인</title>
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/colors.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/typography.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/spacing.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/radius.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/elevation.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/base.css">

<body class="bo-body bo-login-body">
  <main class="bo-login" data-screen-label="BO-00 로그인">
    <div class="bo-login-card">
      <div class="bo-login-brand">
        <img src="../shared/logo.png" alt="CHODRUM 로고" width="36" height="36">
        <div>
          <div class="bo-login-title">CHODRUM</div>
          <div class="bo-login-sub">Admin</div>
        </div>
      </div>
      <h1 class="bo-login-heading">관리자 로그인</h1>
      <p class="bo-login-desc">백오피스 접근을 위해 관리자 계정으로 로그인해 주세요.</p>
      <form id="bo-login-form" class="bo-login-form" novalidate>
        <label class="bo-login-field">
          <span>아이디</span>
          <input id="bo-login-id" type="text" name="id" autocomplete="username" placeholder="관리자 아이디" required>
        </label>
        <label class="bo-login-field">
          <span>비밀번호</span>
          <input id="bo-login-pw" type="password" name="password" autocomplete="current-password" placeholder="비밀번호" required>
        </label>
        <p id="bo-login-err" class="bo-login-err" hidden></p>
        <button type="submit" class="bo-login-submit" id="bo-login-submit">로그인</button>
      </form>
      <a class="bo-login-store" href="/home">스토어 화면으로</a>
    </div>
  </main>
  <script src="../shared/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.5"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/bo-auth.js"></script>
  <script>
    (function () {
      var Auth = window.ChodrumBoAuth;
      if (!Auth) return;
      Auth.redirectIfLoggedIn();

      var form = document.getElementById('bo-login-form');
      var errEl = document.getElementById('bo-login-err');
      var btn = document.getElementById('bo-login-submit');
      var idInput = document.getElementById('bo-login-id');
      if (idInput && window.CHODRUM_CONFIG && CHODRUM_CONFIG.ADMIN_EMAIL) {
        idInput.placeholder = '관리자 이메일 또는 아이디';
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var id = document.getElementById('bo-login-id').value;
        var pw = document.getElementById('bo-login-pw').value;
        errEl.hidden = true;
        errEl.textContent = '';
        btn.disabled = true;
        Promise.resolve(Auth.login(id, pw)).then(function (r) {
          if (!r || !r.ok) {
            errEl.textContent = (r && r.error) || '로그인에 실패했습니다.';
            errEl.hidden = false;
            btn.disabled = false;
            return;
          }
          location.replace(Auth.HOME_PAGE);
        }).catch(function (err) {
          errEl.textContent = (err && err.message) || '로그인에 실패했습니다.';
          errEl.hidden = false;
          btn.disabled = false;
        });
      });
    })();
  </script>
</body>
</html>
