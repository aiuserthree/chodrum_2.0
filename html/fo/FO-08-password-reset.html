<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHODRUM — 비밀번호 찾기</title>
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/colors.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/typography.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/spacing.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/radius.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/elevation.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/base.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/styles.css">
<link rel="stylesheet" href="../shared/fo.css">
</head>
<body class="fo-body">
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/_ds_bundle.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/store.js"></script>
<script src="../shared/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/auth.js"></script>
<script type="text/babel" src="fo-shared.jsx"></script>
<script type="text/babel">
/* FO-08 비밀번호 찾기 — 이메일 Recovery OTP 후 재설정 */
const DS = window.DrumSheetStoreDesignSystem_3a2462;
const { Button, Input, Icon } = DS;
const F = window.FO;
const Auth = window.ChodrumAuth;

function ResetPage() {
  const [step, setStep] = React.useState(1); /* 1 이메일 → 2 코드 → 3 새 비밀번호 → 4 완료 */
  const [email, setEmail] = React.useState('');
  const [code, setCode] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [pw2, setPw2] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState('');
  const emailOk = /.+@.+\..+/.test(email);
  const pwCheck = Auth.validatePassword(pw);

  const sendCode = async () => {
    if (!emailOk || busy) return;
    setBusy(true);
    setErr('');
    try {
      const r = await Auth.sendPasswordRecovery(email.trim());
      if (!r.ok) {
        setErr(r.error || '인증코드를 보내지 못했어요');
        F.toast(r.error || '발송 실패');
        setBusy(false);
        return;
      }
      setStep(2);
      F.toast('인증코드를 보냈어요. 메일함·스팸함을 확인해주세요.');
    } catch (e) {
      setErr((e && e.message) || '발송 오류');
    }
    setBusy(false);
  };

  const verify = async () => {
    if (busy || code.trim().length !== 6) return;
    setBusy(true);
    setErr('');
    try {
      const r = await Auth.verifyRecoveryOtp(email.trim(), code.trim());
      if (!r.ok) {
        setErr(r.error || '인증코드가 올바르지 않아요');
        setBusy(false);
        return;
      }
      setStep(3);
    } catch (e) {
      setErr((e && e.message) || '인증 오류');
    }
    setBusy(false);
  };

  const changePw = async () => {
    if (busy) return;
    if (!pwCheck.ok) { setErr(pwCheck.error); return; }
    if (pw !== pw2) { setErr('비밀번호가 서로 달라요.'); return; }
    setBusy(true);
    setErr('');
    try {
      const r = await Auth.updatePassword(pw);
      if (!r.ok) {
        setErr(r.error || '비밀번호를 변경하지 못했어요');
        setBusy(false);
        return;
      }
      setStep(4);
    } catch (e) {
      setErr((e && e.message) || '변경 오류');
    }
    setBusy(false);
  };

  return (
    <F.Scaffold title="비밀번호 찾기" back={F.PAGES.login} footer={false}>
      <div data-screen-label="FO-08 비밀번호 찾기" className="fo-container narrow" style={{ padding: '0 0 40px' }}>
        <div style={{ padding: '36px 0 20px' }}>
          <h3 style={{ fontSize: 22, letterSpacing: '-0.6px' }}>비밀번호를 잊으셨나요?</h3>
          <p style={{ fontSize: 14, color: 'var(--text-secondary)', marginTop: 8, lineHeight: 1.55 }}>가입한 이메일로 인증하면 새 비밀번호를 설정할 수 있어요.</p>
        </div>

        {step === 1 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Input label="가입 이메일" type="email" placeholder="you@example.com" value={email} onChange={(e) => { setEmail(e.target.value); setErr(''); }} error={err || undefined} />
            <Button variant="primary" size="lg" fullWidth disabled={!emailOk || busy} onClick={sendCode}>{busy ? '발송 중…' : '인증코드 받기'}</Button>
          </div>
        ) : null}

        {step === 2 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Input label="인증코드" placeholder="6자리 코드" value={code} onChange={(e) => { setCode(e.target.value.replace(/\D/g, '').slice(0, 6)); setErr(''); }} error={err || undefined} hint={email + ' 로 코드를 보냈어요. 스팸함도 확인해보세요.'} />
            <Button variant="primary" size="lg" fullWidth disabled={code.trim().length !== 6 || busy} onClick={verify}>{busy ? '확인 중…' : '인증 확인'}</Button>
            <Button variant="ghost" size="md" fullWidth disabled={busy} onClick={sendCode}>코드 재발송</Button>
          </div>
        ) : null}

        {step === 3 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Input label="새 비밀번호" type="password" placeholder={Auth.passwordHint()} value={pw} onChange={(e) => { setPw(e.target.value); setErr(''); }} error={pw && !pwCheck.ok ? pwCheck.error : (err || undefined)} hint={Auth.passwordHint()} />
            <Input label="새 비밀번호 확인" type="password" placeholder="한 번 더 입력" value={pw2} onChange={(e) => setPw2(e.target.value)} error={pw2 && pw !== pw2 ? '비밀번호가 서로 달라요.' : undefined} />
            <Button variant="primary" size="lg" fullWidth disabled={!(pwCheck.ok && pw === pw2) || busy} onClick={changePw}>{busy ? '변경 중…' : '비밀번호 변경'}</Button>
          </div>
        ) : null}

        {step === 4 ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16, alignItems: 'center', textAlign: 'center', padding: '20px 0' }}>
            <span style={{ width: 56, height: 56, borderRadius: 9999, background: 'var(--status-success-bg)', color: 'var(--status-success)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="check" size={28} /></span>
            <div style={{ fontSize: 18, fontWeight: 600, letterSpacing: '-0.4px' }}>비밀번호가 변경되었어요</div>
            <p className="fo-caption">새 비밀번호로 다시 로그인해주세요.</p>
            <div style={{ width: '100%' }}><Button variant="primary" size="lg" fullWidth onClick={() => location.href = F.PAGES.login}>로그인하러 가기</Button></div>
          </div>
        ) : null}

        <div style={{ marginTop: 24, padding: '12px 14px', background: 'var(--surface-sunken)', border: '1px solid var(--border-default)', borderRadius: 'var(--radius-lg)', display: 'flex', gap: 8 }}>
          <Icon name="info" size={14} style={{ color: 'var(--color-icon)', marginTop: 1, flex: 'none' }} />
          <span className="fo-caption">카카오 · 네이버 · 구글로 가입한 소셜 회원은 비밀번호가 없어요. 각 플랫폼의 소셜 로그인을 이용해주세요.</span>
        </div>
      </div>
    </F.Scaffold>
  );
}
window.ChodrumBoot.whenReady(() => {
  ReactDOM.createRoot(document.getElementById('app')).render(<ResetPage />);
});
</script>
</body>
</html>
