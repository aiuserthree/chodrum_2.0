<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/typography.css">

<body class="fo-body">
<div id="app" style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;text-align:center;">
  <div>
    <div style="font-size:15px;font-weight:500;letter-spacing:-0.2px;">로그인 처리 중…</div>
    <p class="fo-caption" style="margin-top:10px;">잠시만 기다려 주세요.</p>
  </div>
</div>
<script src="../shared/fo-theme.js?v=20260720b"></script>
<script src="../shared/data.js"></script>
<script src="../shared/store.js"></script>
<script src="../shared/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.5"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/auth.js?v=20260720b"></script>
<script>
(function () {
  var app = document.getElementById('app');
  function showError(msg) {
    app.innerHTML =
      '<div style="max-width:360px">' +
      '<div style="font-size:17px;font-weight:600;letter-spacing:-0.3px;">로그인에 실패했어요</div>' +
      '<p class="fo-caption" style="margin-top:10px;line-height:1.55">' + (msg || '다시 시도해주세요.') + '</p>' +
      '<p style="margin-top:22px"><a href="/login" style="font-weight:500">로그인으로 돌아가기</a></p>' +
      '</div>';
  }

  window.ChodrumBoot.whenReady(function () {
    window.ChodrumAuth.finishOAuthRedirect().then(function (r) {
      if (!r || !r.ok) {
        showError(r && r.error);
        return;
      }
      /* 신규 소셜 회원: 약관 동의 후에만 members 생성 · 앱 로그인 */
      if (r.needsTerms) {
        location.replace('/oauth-terms');
        return;
      }
      location.replace('/mypage');
    }).catch(function (e) {
      showError((e && e.message) || '알 수 없는 오류');
    });
  });
})();
</script>
</body>
