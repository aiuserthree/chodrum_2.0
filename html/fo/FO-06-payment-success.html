<title>CHODRUM — 결제 승인 중</title>
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/colors.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/typography.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/spacing.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/radius.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/elevation.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/base.css">

<link rel="stylesheet" href="../shared/fo.css">
</head>
<body class="fo-body">
<div id="app" style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;text-align:center;">
  <div>
    <div style="font-size:15px;font-weight:500;letter-spacing:-0.2px;">결제를 확인하고 있어요…</div>
    <p class="fo-caption" style="margin-top:10px;">잠시만 기다려 주세요.</p>
  </div>
</div>
<script src="../shared/data.js"></script>
<script src="../shared/store.js"></script>
<script src="../shared/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.5"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/toss-payments.js"></script>
<script>
(function () {
  var app = document.getElementById('app');

  function showError(msg) {
    app.innerHTML =
      '<div style="max-width:380px">' +
      '<div style="font-size:17px;font-weight:600;letter-spacing:-0.3px;">결제를 완료하지 못했어요</div>' +
      '<p class="fo-caption" style="margin-top:10px;line-height:1.55">' + (msg || '다시 시도해주세요.') + '</p>' +
      '<p style="margin-top:22px;display:flex;flex-direction:column;gap:10px;align-items:center">' +
      '<a href="/checkout" style="font-weight:600;color:var(--text-primary)">주문 / 결제로 돌아가기</a>' +
      '<a href="/cart" style="font-weight:500;color:var(--text-secondary)">장바구니</a>' +
      '</p></div>';
  }

  var q = new URLSearchParams(location.search);
  var paymentKey = q.get('paymentKey');
  var orderId = q.get('orderId');
  var amount = q.get('amount');

  if (!paymentKey || !orderId || !amount) {
    showError('결제 결과 파라미터가 부족해요. 장바구니에서 다시 결제를 진행해주세요.');
    return;
  }

  function run() {
    window.ChodrumPayments.handleSuccess({
      paymentKey: paymentKey,
      orderId: orderId,
      amount: amount,
      paymentType: q.get('paymentType') || 'NORMAL',
      demo: q.get('demo'),
    }).then(function (r) {
      if (!r || !r.ok) {
        showError(r && r.error);
        return;
      }
      location.replace('/order-complete');
    }).catch(function (e) {
      showError((e && e.message) || '알 수 없는 오류');
    });
  }

  if (window.ChodrumBoot && typeof window.ChodrumBoot.whenReady === 'function') {
    window.ChodrumBoot.whenReady(run);
  } else {
    run();
  }
})();
</script>
</body>
</html>
