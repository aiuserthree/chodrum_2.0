<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHODRUM — 찜 목록</title>
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/colors.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/typography.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/spacing.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/radius.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/elevation.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/tokens/base.css">
<link rel="stylesheet" href="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/styles.css">
<link rel="stylesheet" href="../shared/fo.css">
</head>
<body class="fo-body">
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds/drum-sheet-store-design-system-3a2462a0-2443-475e-a3b6-f7937913eb0b/_ds_bundle.js"></script>
<script src="../shared/data.js"></script>
<script src="../shared/store.js"></script>
<script src="../shared/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/api.js"></script>
<script type="text/babel" src="fo-shared.jsx"></script>
<script type="text/babel">
/* FO-04 찜 목록 — 장바구니 담기 · 찜 해제 */
const DS = window.DrumSheetStoreDesignSystem_3a2462;
const { Button, IconButton, Icon } = DS;
const F = window.FO;
const D = window.DrumData;

function WishlistPage() {
  F.useStoreTick();
  const user = Store.user.get();
  const items = Store.fav.list().map(D.byId).filter(Boolean);

  const addAll = () => { items.forEach((s) => Store.cart.add(s.id, 1)); F.toast('찜한 악보 ' + items.length + '개를 장바구니에 담았어요'); };

  return (
    <F.Scaffold title="찜 목록" back={F.PAGES.my}>
      <div data-screen-label="FO-04 찜 목록" className="fo-container mid" style={{ padding: 0 }}>
        {items.length ? (
          <React.Fragment>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '18px 0 6px' }}>
              <span className="ds-mono" style={{ fontSize: 13, color: 'var(--text-secondary)' }}>찜한 악보 {items.length}개</span>
              <Button variant="secondary" size="sm" iconLeft="shopping-cart" onClick={addAll}>전체 담기</Button>
            </div>
            <div>
              {items.map((s, i) => (
                <div key={s.id} style={{ borderTop: i ? '1px solid var(--border-default)' : 'none' }}>
                  <F.SheetRow s={s}
                    sub={<div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{s.artist} · {s.level}</span><F.Money value={s.price} size={14} /></div>}
                    right={
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'flex-end' }}>
                        <IconButton name="x" variant="ghost" size="sm" label="찜 해제" onClick={() => { Store.fav.toggle(s.id); F.toast('찜을 해제했어요'); }} />
                        <Button variant="secondary" size="sm" iconLeft="shopping-cart" onClick={() => { Store.cart.add(s.id, 1); F.toast('장바구니에 담았어요'); }}>담기</Button>
                      </div>
                    } />
                </div>
              ))}
            </div>
            <p className="fo-caption" style={{ display: 'flex', alignItems: 'center', gap: 6, paddingTop: 16 }}>
              <Icon name="info" size={13} style={{ color: 'var(--color-icon)' }} />
              {user ? '찜 목록은 계정에 저장되어 어디서나 동일하게 보여요.' : '로그인하지 않으면 찜 목록은 이 브라우저에만 임시 저장돼요.'}
            </p>
          </React.Fragment>
        ) : (
          <F.Empty icon="heart" title="찜한 악보가 없어요" sub="악보 카드의 하트를 눌러 관심 악보를 저장해보세요." action="악보 둘러보기" href={F.PAGES.list} />
        )}
      </div>
    </F.Scaffold>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<WishlistPage />);
</script>
</body>
</html>
